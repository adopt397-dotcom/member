<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GongBoo.org</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: #fff;
      padding: 48px 36px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      transition: border 0.2s;
      background: #fafafa;
    }
    .form-group input:focus {
      outline: none;
      border-color: #f5a623;
      background: #fff;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #f5a623;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
    }
    .btn-primary:hover { background: #e0941a; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .result-box {
      background: #f8f9fa;
      padding: 14px;
      border-radius: 10px;
      margin-top: 16px;
      font-size: 14px;
      min-height: 50px;
      border: 1px solid #eee;
      color: #333;
    }
    .result-box.success { border-color: #27ae60; background: #eafaf1; color: #1e7e34; }
    .result-box.error { border-color: #e74c3c; background: #fdedec; color: #b03a2e; }
    .toggle-text {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 18px;
    }
    .toggle-text a {
      color: #f5a623;
      font-weight: 600;
      text-decoration: none;
    }
    .toggle-text a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <h1>🔐 GongBoo.org</h1>
  <p class="subtitle">Login to start SAT practice</p>

  <div class="form-group">
    <label>E-mail</label>
    <input id="loginEmail" type="email" placeholder="example@email.com">
  </div>
  <div class="form-group">
    <label>Password (PIN)</label>
    <input id="loginPassword" type="password" placeholder="Enter your password">
  </div>

  <button class="btn-primary" id="loginBtn">Login</button>
  <div id="loginResult" class="result-box">Waiting for login.</div>

  <div class="toggle-text">
    Don't have an account? <a href="#" id="signupLink">Sign Up</a>
  </div>
</div>

<script>
// ============================================================
// 설정
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxadHBMhdMmUPgRvq_V-e7J9hnZFKgrkzqN2-MQ1jbqghaQXNAXIod7tH4BNm3R6o5h/exec';

// ★★★★★ Tilda.cc 주소 (로그인 성공 후 복귀) ★★★★★
const TILDA_URL = 'https://gongboo.tilda.ws/login';

// ============================================================
// DOM 요소
// ============================================================
const emailInput = document.getElementById('loginEmail');
const passInput = document.getElementById('loginPassword');
const loginBtn = document.getElementById('loginBtn');
const resultBox = document.getElementById('loginResult');

// ============================================================
// 결과 표시
// ============================================================
function showResult(message, isSuccess) {
  resultBox.textContent = message;
  resultBox.className = 'result-box' + (isSuccess ? ' success' : ' error');
}

// ============================================================
// 로그인 처리
// ============================================================
async function handleLogin() {
  const email = emailInput.value.trim();
  const password = passInput.value.trim();

  if (!email || !password) {
    showResult('❌ Please enter both email and password.', false);
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = '⏳ Processing...';
  showResult('⏳ Logging in...', false);

  try {
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'login', email, pin: password })
    });
    const data = await response.json();

    if (data.success) {
      // ★★★★★ 세션 저장 (auth.js 사용 또는 자체 저장) ★★★★★
      if (typeof window.saveSession === 'function') {
        window.saveSession(email, data.name);
      } else {
        sessionStorage.setItem('user', JSON.stringify({ email, name: data.name, loggedIn: true }));
      }

      showResult('✅ Login successful! Redirecting...', true);
      setTimeout(function() {
        window.location.href = TILDA_URL;
      }, 1500);
    } else {
      showResult('❌ ' + data.message, false);
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  } catch (err) {
    showResult('❌ Server connection error: ' + err.message, false);
    loginBtn.disabled = false;
    loginBtn.textContent = 'Login';
  }
}

// ============================================================
// 이벤트 바인딩
// ============================================================
loginBtn.addEventListener('click', handleLogin);
passInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleLogin();
});
emailInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleLogin();
});

// ============================================================
// Sign Up 링크
// ============================================================
document.getElementById('signupLink').addEventListener('click', function(e) {
  e.preventDefault();
  alert('Sign up feature coming soon.');
});

console.log('✅ login.html loaded.');
console.log('✅ GAS_URL:', GAS_URL);
console.log('✅ Redirect to:', TILDA_URL);
</script>

</body>
</html>
